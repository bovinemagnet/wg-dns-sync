name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Antora
        run: npm install -g antora@3.1

      - name: Build documentation
        run: antora --fetch antora-playbook.yml

  license-headers:
    name: license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SPDX headers
        run: |
          missing=$(find . -name '*.go' -not -path './vendor/*' -print0 \
            | xargs -0 grep -L 'SPDX-License-Identifier' || true)
          if [ -n "$missing" ]; then
            echo "::error::Go files missing an SPDX-License-Identifier header:"
            echo "$missing"
            exit 1
          fi
          echo "All Go files carry an SPDX-License-Identifier header."
